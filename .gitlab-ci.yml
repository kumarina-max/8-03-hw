stages:
  - test
  - build
  - deploy

test_job:
  stage: test
  image: alpine:latest
  tags:
    - docker
  script:
    - echo "=== Запуск тестов ==="
    - echo "Проверяем окружение"
    - uname -a
    - echo "Тесты успешно пройдены!"

build_job:
  stage: build
  image: alpine:latest
  tags:
    - docker
  script:
    - echo "=== Сборка проекта ==="
    - mkdir -p build
    - echo "Результат сборки от $(date)" > build/info.txt
    - cat build/info.txt
  artifacts:
    paths:
      - build/
    expire_in: 1 week

deploy_job:
  stage: deploy
  image: alpine:latest
  tags:
    - docker
  script:
    - echo "=== Деплой ==="
    - ls -la build/ 2>/dev/null || echo "Артефакты не найдены"
    - echo "Деплой успешно выполнен!"
  only:
    - main
